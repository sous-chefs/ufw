---
driver:
  name: dokken
  privileged: true
  chef_image: chef/chefworkstation
  chef_version: current

transport:
  name: dokken

provisioner:
  name: dokken

verifier:
  name: inspec
  sudo: true

platforms:
  - name: debian-12
  - name: debian-13
  - name: ubuntu-22.04
  - name: ubuntu-24.04

x-run_lists:
  default: &default_run_list
    - recipe[test::default]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier
